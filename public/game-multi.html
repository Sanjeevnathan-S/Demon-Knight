<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demon Knight Multiplayer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,#2d1b69 0%,#111827 45%,#050816 100%);
    color:white;
    font-family:Inter,Segoe UI,sans-serif;

    display:flex;
    flex-direction:column;
    align-items:center;

    padding:25px;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:3rem;
    letter-spacing:2px;
    text-transform:uppercase;

    background:linear-gradient(90deg,#ff7b00,#ffd700);
    -webkit-background-clip:text;
    color:transparent;
}

.header p{
    color:#bdbdbd;
    margin-top:8px;
}

.dashboard{
    width:min(1200px,100%);
    display:grid;
    grid-template-columns:320px 1fr;
    gap:20px;
}

.sidebar{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:18px;

    padding:20px;
}

.card{
    margin-bottom:18px;
}

.card h3{
    margin-bottom:12px;
    color:#ffd700;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#00ff88;

    box-shadow:0 0 10px #00ff88;
}

.player-list{
    list-style:none;
}

.player-list li{
    padding:10px;
    margin-top:8px;

    border-radius:10px;

    background:rgba(255,255,255,.05);
}

.game-panel{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);

    border-radius:18px;
    padding:15px;
}

canvas{
    width:100%;
    max-width:1800px;

    border-radius:15px; 

    border:2px solid rgba(255,255,255,.15);

    box-shadow:
    0 0 25px rgba(255,215,0,.2);

    background:#0d1117;
}

@media(max-width:1800px){

    .dashboard{
        grid-template-columns:1fr;
    }

}
</style>
</head>

<body>

<div class="header">
    <h1>Demon Knight</h1>
    <p>Real-Time Multiplayer Arena</p>
</div>

<div class="dashboard">

    <div class="game-panel">
        <canvas id="gameCanvas"
                width="1800"
                height="800">
        </canvas>
    </div>

    <div class="sidebar">

        <div class="card">
            <h3>Session</h3>
            <p id="sessionId">Loading...</p>
        </div>

        <div class="card">
            <h3>Status</h3>

            <div class="status">
                <span class="dot"></span>
                Connected
            </div>
        </div>

        <div class="card">
            <h3>Players Online</h3>

            <ul id="playerList" class="player-list">
                <li>Waiting for players...</li>
            </ul>
        </div>

    </div>

    

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/DemonKnight-multi.js"></script>

</body>
</html>
